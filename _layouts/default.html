<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - BriqueParBrique</title>
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" type="image/png" href="/assets/images/logo.png" sizes="800x800">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>

<body>

  <a class="skip-link" href="#briques">Aller au contenu principal</a>

  {{ content }}

  <footer role="contentinfo">
    <p class="footer-actions">
      <a href="https://github.com/BriqueParBrique/BriqueParBrique.github.io/edit/main/{{ page.path }}">Améliorer cette page</a>
      <span aria-hidden="true">&middot;</span>
      <a href="https://github.com/BriqueParBrique/BriqueParBrique.github.io/issues/new?title=Souci sur « {{ page.title }} »">Signaler un souci</a>
    </p>
    <p>BriqueParBrique &mdash; <a href="https://github.com/BriqueParBrique">GitHub</a></p>
  </footer>

  {% if page.scripts %}
  {% for script in page.scripts %}
  <script src="/assets/js/{{ script }}.js"></script>
  {% endfor %}
  {% endif %}

</body>

</html>
